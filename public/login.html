<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--surface);
            padding: 1rem;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-group {
            margin-bottom: 1.25rem;
        }

        .auth-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .auth-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--surface-hover);
        }

        .btn-full {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            margin-top: 1rem;
            justify-content: center;
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .auth-footer a:hover {
            opacity: 0.8;
        }

        .error-msg {
            margin-top: 1.25rem;
            color: var(--c-rejected);
            font-size: 0.85rem;
            text-align: center;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>
    <script>
        // Pre-apply theme to avoid flash
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') document.body.classList.add('dark-mode');
        document.body.classList.add('auth-page');
    </script>

    <div class="auth-card">
        <div class="auth-header">
            <h2>Tracker</h2>
            <p id="auth-subtitle">Welcome back! Please enter your details.</p>
        </div>

        <form id="auth-form">
            <div class="auth-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter username">
            </div>

            <div class="auth-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>

            <button type="submit" id="auth-submit-btn" class="btn btn-primary btn-full">Sign In</button>

            <div id="auth-error" class="error-msg hidden"></div>
        </form>

        <div class="auth-footer" id="auth-switch-container">
            <span id="auth-mode-text">Don't have an account?</span>
            <a id="switch-auth-link">Sign up</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
